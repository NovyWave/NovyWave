name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read and validate version
        id: version
        run: |
          set -e

          # Read version from Cargo.toml
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Version not found in Cargo.toml"
            exit 1
          fi

          # Read version from tauri.conf.json
          TAURI_VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][0-9.]*\)".*/\1/')
          if [ -z "$TAURI_VERSION" ]; then
            echo "::error::Version not found in src-tauri/tauri.conf.json"
            exit 1
          fi

          # Check versions match
          if [ "$CARGO_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but tauri.conf.json has $TAURI_VERSION"
            exit 1
          fi

          echo "Release version: $CARGO_VERSION"

          # If triggered by tag, verify tag matches code
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION does not match code version $CARGO_VERSION â€” update Cargo.toml and tauri.conf.json first"
              exit 1
            fi
          fi

          # Get the latest existing release tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#v}"
            echo "Latest released version: $LATEST_VERSION"

            # Compare versions using sort -V
            HIGHER=$(printf '%s\n%s' "$LATEST_VERSION" "$CARGO_VERSION" | sort -V | tail -1)
            if [ "$CARGO_VERSION" = "$LATEST_VERSION" ]; then
              echo "::error::Version $CARGO_VERSION is the same as the latest release â€” bump the version in Cargo.toml and tauri.conf.json"
              exit 1
            elif [ "$HIGHER" = "$LATEST_VERSION" ]; then
              echo "::error::Version $CARGO_VERSION is lower than the latest release $LATEST_VERSION â€” bump the version in Cargo.toml and tauri.conf.json"
              exit 1
            fi
            echo "Version $CARGO_VERSION is newer than $LATEST_VERSION"
          else
            echo "No previous release tags found â€” first release"
          fi

          echo "version=$CARGO_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: validate-version
    uses: ./.github/workflows/build.yml
    with:
      release-build: true
      version: ${{ needs.validate-version.outputs.version }}
    secrets: inherit

  create-release:
    needs: [validate-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Generate unified latest.json for updater
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Initialize platforms JSON
          PLATFORMS="{}"

          # Linux x86_64 (AppImage)
          LINUX_SIG=$(find artifacts/linux-updater -name "*.AppImage.sig" -type f | head -1)
          LINUX_APPIMAGE=$(find artifacts/linux-updater -name "*.AppImage" ! -name "*.sig" -type f | head -1)
          if [ -n "$LINUX_SIG" ] && [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_SIG_CONTENT=$(cat "$LINUX_SIG")
            LINUX_FILENAME=$(basename "$LINUX_APPIMAGE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$LINUX_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${LINUX_FILENAME}" '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # macOS ARM (aarch64)
          MACOS_ARM_SIG=$(find artifacts/macos-updater-arm -name "*.tar.gz.sig" -type f 2>/dev/null | head -1)
          MACOS_ARM_TARBALL=$(find artifacts/macos-updater-arm -name "*.tar.gz" ! -name "*.sig" -type f 2>/dev/null | head -1)
          if [ -n "$MACOS_ARM_SIG" ] && [ -n "$MACOS_ARM_TARBALL" ]; then
            MACOS_ARM_SIG_CONTENT=$(cat "$MACOS_ARM_SIG")
            MACOS_ARM_FILENAME=$(basename "$MACOS_ARM_TARBALL")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MACOS_ARM_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${MACOS_ARM_FILENAME}" '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          # macOS x64
          MACOS_X64_SIG=$(find artifacts/macos-updater-x64 -name "*.tar.gz.sig" -type f 2>/dev/null | head -1)
          MACOS_X64_TARBALL=$(find artifacts/macos-updater-x64 -name "*.tar.gz" ! -name "*.sig" -type f 2>/dev/null | head -1)
          if [ -n "$MACOS_X64_SIG" ] && [ -n "$MACOS_X64_TARBALL" ]; then
            MACOS_X64_SIG_CONTENT=$(cat "$MACOS_X64_SIG")
            MACOS_X64_FILENAME=$(basename "$MACOS_X64_TARBALL")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MACOS_X64_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${MACOS_X64_FILENAME}" '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Windows x64 (NSIS only)
          WINDOWS_SIG=$(find artifacts/windows-updater -name "*.sig" -type f 2>/dev/null | head -1)
          WINDOWS_BUNDLE=$(find artifacts/windows-nsis -name "*-setup.exe" -type f 2>/dev/null | head -1)
          if [ -n "$WINDOWS_SIG" ] && [ -n "$WINDOWS_BUNDLE" ]; then
            WINDOWS_SIG_CONTENT=$(cat "$WINDOWS_SIG")
            WINDOWS_FILENAME=$(basename "$WINDOWS_BUNDLE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$WINDOWS_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${WINDOWS_FILENAME}" '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Create unified latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See release notes on GitHub" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > artifacts/latest.json

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f | while read f; do
            cp "$f" "release-files/$(basename "$f")"
          done
          echo "=== Release files ==="
          ls -la release-files/

      - name: Create draft release
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          cat > /tmp/release-notes.md << 'NOTES'
          ## Downloads

          | Platform | File |
          |----------|------|
          | **Linux** | |
          | AppImage | `NovyWave_VERSION_amd64.AppImage` |
          | Debian/Ubuntu | `novywave_VERSION_amd64.deb` |
          | Fedora/RHEL | `novywave-VERSION-1.x86_64.rpm` |
          | Chrome launcher | `novywave-chrome-linux-x64` |
          | **macOS** | |
          | Apple Silicon (M1/M2/M3) | `NovyWave_VERSION_aarch64.dmg` |
          | Intel | `NovyWave_VERSION_x64.dmg` |
          | Chrome launcher (ARM) | `novywave-chrome-macos-aarch64` |
          | Chrome launcher (Intel) | `novywave-chrome-macos-x64` |
          | **Windows** | |
          | Installer (NSIS) | `NovyWave_VERSION_x64-setup.exe` |
          | MSI | `NovyWave_VERSION_x64_en-US.msi` |
          | Chrome launcher | `novywave-chrome-windows-x64.exe` |

          ## Chrome Launcher

          `novywave-chrome` is a lightweight alternative that opens NovyWave in Chrome/Chromium app mode.
          Use it if the standard desktop app has performance issues (especially on Linux).
          Requires Chrome or Chromium installed.

          ## Auto-Update

          Auto-update is available for Linux AppImage, macOS app, and Windows NSIS installs.
          Debian, RPM, and MSI installs update manually by downloading the new package from this release.
          NOTES
          sed -i "s/VERSION/$VERSION/g" /tmp/release-notes.md

          gh release create "v${VERSION}" \
            --title "NovyWave v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --draft \
            release-files/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
