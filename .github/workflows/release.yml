name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.validate-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read and validate version
        id: version
        run: |
          set -e

          # Read version from Cargo.toml
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Version not found in Cargo.toml"
            exit 1
          fi

          # Read version from tauri.conf.json
          TAURI_VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][0-9.]*\)".*/\1/')
          if [ -z "$TAURI_VERSION" ]; then
            echo "::error::Version not found in src-tauri/tauri.conf.json"
            exit 1
          fi

          # Check versions match
          if [ "$CARGO_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but tauri.conf.json has $TAURI_VERSION"
            exit 1
          fi

          echo "Release version: $CARGO_VERSION"

          # If triggered by tag, verify tag matches code
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION does not match code version $CARGO_VERSION — update Cargo.toml and tauri.conf.json first"
              exit 1
            fi
          fi

          # Get the latest existing release tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#v}"
            echo "Latest released version: $LATEST_VERSION"

            # Compare versions using sort -V
            HIGHER=$(printf '%s\n%s' "$LATEST_VERSION" "$CARGO_VERSION" | sort -V | tail -1)
            if [ "$CARGO_VERSION" = "$LATEST_VERSION" ]; then
              echo "::error::Version $CARGO_VERSION is the same as the latest release — bump the version in Cargo.toml and tauri.conf.json"
              exit 1
            elif [ "$HIGHER" = "$LATEST_VERSION" ]; then
              echo "::error::Version $CARGO_VERSION is lower than the latest release $LATEST_VERSION — bump the version in Cargo.toml and tauri.conf.json"
              exit 1
            fi
            echo "Version $CARGO_VERSION is newer than $LATEST_VERSION"
          else
            echo "No previous release tags found — first release"
          fi

          echo "version=$CARGO_VERSION" >> $GITHUB_OUTPUT

  build-linux:
    needs: validate-version
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Create MoonZoon build directories
        run: |
          mkdir -p backend/private
          mkdir -p frontend_dist/_api/pkg

      - name: Check signing key availability
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"
          else
            echo "⚠️ TAURI_SIGNING_PRIVATE_KEY is NOT set - updater artifacts will NOT be created"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app (same as local)
        run: makers tauri-build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUILD_VERSION: ${{ needs.validate-version.outputs.version }}

      - name: Build Chrome launcher for Linux
        run: cargo build --release -p novywave-chrome

      - name: List built artifacts
        run: |
          echo "=== Bundle directory ==="
          ls -la target/release/bundle/ || true
          echo "=== AppImage ==="
          ls -la target/release/bundle/appimage/ || true
          echo "=== Deb ==="
          ls -la target/release/bundle/deb/ || true
          echo "=== RPM ==="
          ls -la target/release/bundle/rpm/ || true
          echo "=== Chrome launcher ==="
          ls -la target/release/novywave-chrome || true

      - name: Upload Chrome launcher
        uses: actions/upload-artifact@v4
        with:
          name: linux-chrome-launcher
          path: target/release/novywave-chrome

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/release/bundle/appimage/*.AppImage

      - name: Upload Deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/release/bundle/deb/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: target/release/bundle/rpm/*.rpm

      - name: Upload Updater artifacts (AppImage + signature)
        uses: actions/upload-artifact@v4
        with:
          name: linux-updater
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig

  build-macos-arm:
    needs: validate-version
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,wasm32-unknown-unknown

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Create MoonZoon build directories
        run: |
          mkdir -p backend/private
          mkdir -p frontend_dist/_api/pkg

      - name: Check signing key availability
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"
          else
            echo "⚠️ TAURI_SIGNING_PRIVATE_KEY is NOT set - updater artifacts will NOT be created"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        run: makers tauri-build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUILD_VERSION: ${{ needs.validate-version.outputs.version }}

      - name: Build Chrome launcher
        run: cargo build --release -p novywave-chrome

      - name: List built artifacts
        run: |
          echo "=== Bundle directory ==="
          ls -la target/release/bundle/ || true
          echo "=== DMG ==="
          ls -la target/release/bundle/dmg/ || true
          echo "=== macOS app ==="
          ls -la target/release/bundle/macos/ || true
          echo "=== Chrome launcher ==="
          ls -la target/release/novywave-chrome || true

      - name: Rename updater artifacts with architecture suffix
        run: |
          cd target/release/bundle/macos
          for f in *.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f%.tar.gz}_aarch64.tar.gz"
          done
          for f in *.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "${f%.tar.gz.sig}_aarch64.tar.gz.sig"
          done
          ls -la

      - name: Upload Chrome launcher (ARM)
        uses: actions/upload-artifact@v4
        with:
          name: macos-chrome-launcher-arm
          path: target/release/novywave-chrome

      - name: Upload DMG (ARM)
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm
          path: target/release/bundle/dmg/*.dmg

      - name: Upload Updater artifacts (ARM)
        uses: actions/upload-artifact@v4
        with:
          name: macos-updater-arm
          path: |
            target/release/bundle/macos/*.tar.gz
            target/release/bundle/macos/*.tar.gz.sig

  build-macos-x64:
    needs: validate-version
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,wasm32-unknown-unknown

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Create MoonZoon build directories
        run: |
          mkdir -p backend/private
          mkdir -p frontend_dist/_api/pkg

      - name: Check signing key availability
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"
          else
            echo "⚠️ TAURI_SIGNING_PRIVATE_KEY is NOT set - updater artifacts will NOT be created"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        run: makers tauri-build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUILD_VERSION: ${{ needs.validate-version.outputs.version }}

      - name: Build Chrome launcher
        run: cargo build --release -p novywave-chrome

      - name: List built artifacts
        run: |
          echo "=== Bundle directory ==="
          ls -la target/release/bundle/ || true
          echo "=== DMG ==="
          ls -la target/release/bundle/dmg/ || true
          echo "=== macOS app ==="
          ls -la target/release/bundle/macos/ || true
          echo "=== Chrome launcher ==="
          ls -la target/release/novywave-chrome || true

      - name: Rename updater artifacts with architecture suffix
        run: |
          cd target/release/bundle/macos
          for f in *.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f%.tar.gz}_x64.tar.gz"
          done
          for f in *.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "${f%.tar.gz.sig}_x64.tar.gz.sig"
          done
          ls -la

      - name: Upload Chrome launcher (x64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-chrome-launcher-x64
          path: target/release/novywave-chrome

      - name: Upload DMG (x64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-x64
          path: target/release/bundle/dmg/*.dmg

      - name: Upload Updater artifacts (x64)
        uses: actions/upload-artifact@v4
        with:
          name: macos-updater-x64
          path: |
            target/release/bundle/macos/*.tar.gz
            target/release/bundle/macos/*.tar.gz.sig

  build-windows:
    needs: validate-version
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,wasm32-unknown-unknown

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Create MoonZoon build directories
        shell: bash
        run: |
          mkdir -p backend/private
          mkdir -p frontend_dist/_api/pkg

      - name: Check signing key availability
        shell: bash
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"
          else
            echo "⚠️ TAURI_SIGNING_PRIVATE_KEY is NOT set - updater artifacts will NOT be created"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        shell: bash
        run: makers tauri-build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUILD_VERSION: ${{ needs.validate-version.outputs.version }}

      - name: Build Chrome launcher
        shell: bash
        run: cargo build --release -p novywave-chrome

      - name: Debug - Check build artifacts exist
        shell: bash
        run: |
          echo "=== Checking frontend_dist ==="
          ls -la frontend_dist/ || echo "No frontend_dist"
          ls -la frontend_dist/_api/ || echo "No frontend_dist/_api"
          echo "=== Checking _api copy ==="
          ls -la _api/ || echo "No _api dir"
          echo "=== Checking frontend/pkg ==="
          ls -la frontend/pkg/ || echo "No frontend/pkg"
          echo "=== Checking bundle output (correct path) ==="
          ls -la target/release/bundle/ 2>/dev/null || echo "No target/release/bundle"
          echo "=== NSIS output ==="
          ls -la target/release/bundle/nsis/ 2>/dev/null || echo "No NSIS bundle"
          echo "=== MSI output ==="
          ls -la target/release/bundle/msi/ 2>/dev/null || echo "No MSI bundle"

      - name: List built artifacts
        shell: bash
        run: |
          echo "=== Bundle directory ==="
          ls -la target/release/bundle/ || echo "No bundle dir"
          echo "=== MSI ==="
          ls -la target/release/bundle/msi/ || echo "No msi dir"
          echo "=== NSIS ==="
          ls -la target/release/bundle/nsis/ || echo "No nsis dir"

      - name: Upload Chrome launcher (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-chrome-launcher
          path: target/release/novywave-chrome.exe

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: target/release/bundle/nsis/*.exe

      - name: Verify updater signature files exist
        shell: bash
        run: |
          echo "=== Checking for signature files ==="
          NSIS_SIG=$(find target/release/bundle/nsis -name "*.sig" 2>/dev/null | head -1)
          MSI_SIG=$(find target/release/bundle/msi -name "*.sig" 2>/dev/null | head -1)

          if [ -n "$NSIS_SIG" ]; then
            echo "✅ NSIS signature found: $NSIS_SIG"
            ls -la target/release/bundle/nsis/*.sig
          else
            echo "❌ NO NSIS signature file found!"
            echo "This means TAURI_SIGNING_PRIVATE_KEY may not have been passed correctly"
            echo "Contents of nsis directory:"
            ls -la target/release/bundle/nsis/ || echo "Directory not found"
          fi

          if [ -n "$MSI_SIG" ]; then
            echo "✅ MSI signature found: $MSI_SIG"
            ls -la target/release/bundle/msi/*.sig
          else
            echo "⚠️ No MSI signature file found (may be expected if only NSIS is used)"
          fi

      - name: Upload Updater artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-updater
          if-no-files-found: warn
          path: |
            target/release/bundle/nsis/*.sig

  create-release:
    needs: [validate-version, build-linux, build-macos-arm, build-macos-x64, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Generate unified latest.json for updater
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Initialize platforms JSON
          PLATFORMS="{}"

          # Linux x86_64 (AppImage) - Tauri v2 uses AppImage directly with .sig
          LINUX_SIG=$(find artifacts/linux-updater -name "*.AppImage.sig" -type f | head -1)
          LINUX_APPIMAGE=$(find artifacts/linux-updater -name "*.AppImage" ! -name "*.sig" -type f | head -1)
          if [ -n "$LINUX_SIG" ] && [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_SIG_CONTENT=$(cat "$LINUX_SIG")
            LINUX_FILENAME=$(basename "$LINUX_APPIMAGE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$LINUX_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${LINUX_FILENAME}" '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # macOS ARM (aarch64)
          MACOS_ARM_SIG=$(find artifacts/macos-updater-arm -name "*.tar.gz.sig" -type f 2>/dev/null | head -1)
          MACOS_ARM_TARBALL=$(find artifacts/macos-updater-arm -name "*.tar.gz" ! -name "*.sig" -type f 2>/dev/null | head -1)
          if [ -n "$MACOS_ARM_SIG" ] && [ -n "$MACOS_ARM_TARBALL" ]; then
            MACOS_ARM_SIG_CONTENT=$(cat "$MACOS_ARM_SIG")
            MACOS_ARM_FILENAME=$(basename "$MACOS_ARM_TARBALL")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MACOS_ARM_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${MACOS_ARM_FILENAME}" '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          # macOS x64
          MACOS_X64_SIG=$(find artifacts/macos-updater-x64 -name "*.tar.gz.sig" -type f 2>/dev/null | head -1)
          MACOS_X64_TARBALL=$(find artifacts/macos-updater-x64 -name "*.tar.gz" ! -name "*.sig" -type f 2>/dev/null | head -1)
          if [ -n "$MACOS_X64_SIG" ] && [ -n "$MACOS_X64_TARBALL" ]; then
            MACOS_X64_SIG_CONTENT=$(cat "$MACOS_X64_SIG")
            MACOS_X64_FILENAME=$(basename "$MACOS_X64_TARBALL")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MACOS_X64_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${MACOS_X64_FILENAME}" '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Windows x64 (NSIS only)
          # MSI stays downloadable, but NovyWave only treats NSIS installs as updater-capable.
          echo "=== Windows updater artifact check ==="
          echo "Contents of windows-updater artifact:"
          ls -la artifacts/windows-updater/ 2>/dev/null || echo "No windows-updater directory"

          WINDOWS_SIG=$(find artifacts/windows-updater -name "*.sig" -type f 2>/dev/null | head -1)
          WINDOWS_BUNDLE=$(find artifacts/windows-nsis -name "*-setup.exe" -type f 2>/dev/null | head -1)

          if [ -n "$WINDOWS_SIG" ] && [ -n "$WINDOWS_BUNDLE" ]; then
            echo "✅ Windows updater: Found NSIS signature and bundle"
            echo "  Signature: $WINDOWS_SIG"
            echo "  Bundle: $WINDOWS_BUNDLE"
            WINDOWS_SIG_CONTENT=$(cat "$WINDOWS_SIG")
            WINDOWS_FILENAME=$(basename "$WINDOWS_BUNDLE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$WINDOWS_SIG_CONTENT" --arg url "https://github.com/NovyWave/NovyWave/releases/download/v${VERSION}/${WINDOWS_FILENAME}" '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          else
            echo "❌ Windows updater: Missing signature or bundle"
            echo "  WINDOWS_SIG: ${WINDOWS_SIG:-NOT FOUND}"
            echo "  WINDOWS_BUNDLE: ${WINDOWS_BUNDLE:-NOT FOUND}"
            echo "  This means Windows auto-update will NOT work!"
          fi

          # Create unified latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See release notes on GitHub" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > artifacts/latest.json

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: NovyWave v${{ needs.validate-version.outputs.version }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | **Linux** | |
            | AppImage | `NovyWave_${{ needs.validate-version.outputs.version }}_amd64.AppImage` |
            | Debian/Ubuntu | `novywave_${{ needs.validate-version.outputs.version }}_amd64.deb` |
            | Fedora/RHEL | `novywave-${{ needs.validate-version.outputs.version }}-1.x86_64.rpm` |
            | **macOS** | |
            | Apple Silicon (M1/M2/M3) | `NovyWave_${{ needs.validate-version.outputs.version }}_aarch64.dmg` |
            | Intel | `NovyWave_${{ needs.validate-version.outputs.version }}_x64.dmg` |
            | **Windows** | |
            | Installer (NSIS) | `NovyWave_${{ needs.validate-version.outputs.version }}_x64-setup.exe` |
            | MSI | `NovyWave_${{ needs.validate-version.outputs.version }}_x64_en-US.msi` |

            ## Auto-Update

            Auto-update is available for Linux AppImage, macOS app, and Windows NSIS installs.
            Debian, RPM, and MSI installs update manually by downloading the new package from this release.
          draft: true
          prerelease: false
          files: |
            artifacts/linux-appimage/*.AppImage
            artifacts/linux-updater/*.AppImage.sig
            artifacts/linux-deb/*.deb
            artifacts/linux-rpm/*.rpm
            artifacts/linux-chrome-launcher/novywave-chrome
            artifacts/macos-dmg-arm/*.dmg
            artifacts/macos-dmg-x64/*.dmg
            artifacts/macos-chrome-launcher-arm/novywave-chrome
            artifacts/macos-chrome-launcher-x64/novywave-chrome
            artifacts/macos-updater-arm/*.tar.gz
            artifacts/macos-updater-arm/*.tar.gz.sig
            artifacts/macos-updater-x64/*.tar.gz
            artifacts/macos-updater-x64/*.tar.gz.sig
            artifacts/windows-msi/*.msi
            artifacts/windows-nsis/*.exe
            artifacts/windows-chrome-launcher/novywave-chrome.exe
            artifacts/windows-updater/**/*.sig
            artifacts/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
